<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ome365</title>
<link rel="stylesheet" href="/static/style.css?v=20260417">
<style>
  /* ══ 核心：杀掉 style.css 的驾舱布局规则 ══ */
  html { height: auto !important; }
  body {
    overflow: auto !important; overflow-x: hidden !important;
    display: block !important; height: auto !important; min-height: 100vh !important;
    position: static !important;
  }
  /* 驾舱用 #app — 分享页不用，但以防万一 */
  #app, #share-root { display: block !important; height: auto !important; overflow: visible !important; position: static !important; }
  /* 驾舱布局容器在分享页不存在，但万一有同名 class */
  .sidebar, .main-area, .topbar, .bottom-nav, .loading-screen { display: none !important; }
  .content { overflow: visible !important; height: auto !important; padding: 0 !important; flex: none !important; }
  /* 驾舱用 IntersectionObserver 控制 .is-in，分享页没有那个 JS，直接禁掉滚动揭示 */
  .rv-section { opacity: 1 !important; transform: none !important; filter: none !important; transition: none !important; }
  .rv-hero-eyebrow, .rv-hero-title, .rv-preface { filter: none !important; opacity: 1 !important; transform: none !important; }

  /* ══ 分享页专属 ══ */
  .share-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 8px 80px; position: relative; }
  .share-loading { text-align: center; padding: 120px 20px; color: var(--text2); font-size: 15px; }
  .share-error { text-align: center; padding: 120px 20px; color: #ef4444; font-size: 15px; }
  .sh-theme-toggle { position: fixed; top: 16px; right: 16px; z-index: 100; width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface, rgba(18,18,30,0.8)); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .sh-theme-toggle:hover { border-color: var(--gold); color: var(--gold); }
  [data-theme="longfor"] .sh-theme-toggle { background: rgba(255,255,255,0.7); border-color: #e2e8f0; color: #64748b; }
  [data-theme="longfor"] .sh-theme-toggle:hover { border-color: #818cf8; color: #4f46e5; }
  [data-theme="longfor"] .sh-footer { color: #94a3b8; border-top-color: #e2e8f0; }
  .sh-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text2); }
  .rv-hero { margin: 24px 0; }

  /* ══ TicNote mode ══ */
  .sh-tabs { display: flex; gap: 4px; padding: 4px; background: rgba(10,10,22,0.6); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }
  .sh-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 9px; border: none; background: transparent; color: rgba(245,230,200,0.42); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.18s; font-family: inherit; }
  .sh-tab:hover { background: rgba(200,169,110,0.06); color: rgba(245,230,200,0.7); }
  .sh-tab.active { background: rgba(200,169,110,0.1); color: var(--text); border: 1px solid rgba(200,169,110,0.2); }
  .sh-tab-count { font-size: 10px; background: rgba(200,169,110,0.15); padding: 2px 6px; border-radius: 99px; color: rgba(200,169,110,0.85); font-weight: 600; }
  .sh-tab-content { animation: shFadeIn 0.25s ease; }
  @keyframes shFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  .sh-sum-card { margin-bottom: 16px; border-radius: 12px; border: 1px solid rgba(200,169,110,0.1); background: var(--card-bg); overflow: hidden; transition: border-color 0.2s; }
  .sh-sum-card:hover { border-color: rgba(200,169,110,0.22); }
  .sh-sum-card-head { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid rgba(200,169,110,0.06); background: rgba(200,169,110,0.03); }
  .sh-sum-card-num { font-size: 10px; font-weight: 700; color: rgba(200,169,110,0.5); font-family: ui-monospace, monospace; letter-spacing: 0.1em; }
  .sh-sum-card-icon { font-size: 18px; }
  .sh-sum-card-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .sh-sum-card-body { padding: 14px 18px; font-size: 13px; line-height: 1.72; color: var(--text2); word-break: break-word; }
  .sh-sum-card-body p { margin: 6px 0; }
  .sh-sum-card-body strong { color: #f2c77a; }
  .sh-sum-card-body ul, .sh-sum-card-body ol { margin: 6px 0 6px 18px; }
  .sh-sum-card-body li { margin: 3px 0; }
  .sh-trans-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; padding: 10px 14px; background: rgba(10,10,22,0.4); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
  .sh-trans-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid; border-radius: 999px; font-size: 11px; font-weight: 600; color: rgba(245,230,200,0.75); }
  .sh-trans-chip-dot { width: 8px; height: 8px; border-radius: 50%; }
  .sh-trans-chip-pct { font-size: 10px; color: rgba(245,230,200,0.45); font-weight: 400; }
  .sh-trans-blocks { display: flex; flex-direction: column; }
  .sh-trans-block { display: flex; gap: 12px; }
  .sh-trans-gutter { display: flex; flex-direction: column; align-items: center; flex: 0 0 36px; }
  .sh-trans-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #0a0a16; flex-shrink: 0; }
  .sh-trans-line { width: 2px; flex: 1; min-height: 8px; background: rgba(255,255,255,0.06); }
  .sh-trans-content { flex: 1; min-width: 0; padding: 4px 0 14px; }
  .sh-trans-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .sh-trans-name { font-size: 12px; font-weight: 700; }
  .sh-trans-time { font-size: 10px; color: rgba(245,230,200,0.35); font-family: ui-monospace, monospace; }
  .sh-trans-text { font-size: 13px; line-height: 1.7; color: var(--text2); word-break: break-word; }
  .sh-insight-card { display: flex; gap: 14px; padding: 16px 20px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(200,169,110,0.1); background: var(--card-bg); transition: border-color 0.2s; }
  .sh-insight-card:hover { border-color: rgba(200,169,110,0.22); }
  .sh-insight-overview { background: linear-gradient(135deg, rgba(200,169,110,0.08), rgba(200,169,110,0.02)); border-color: rgba(200,169,110,0.2); }
  .sh-insight-risk { border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.03); }
  .sh-insight-card-icon { font-size: 22px; flex: 0 0 28px; text-align: center; padding-top: 2px; }
  .sh-insight-card-body { flex: 1; min-width: 0; }
  .sh-insight-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .sh-insight-card-text { font-size: 13px; line-height: 1.7; color: var(--text2); }
  .sh-insight-card-text p { margin: 6px 0; }
  .sh-insight-card-text strong { color: #f2c77a; }
  .sh-insight-bars { display: flex; flex-direction: column; gap: 6px; }
  .sh-insight-bar-row { display: flex; align-items: center; gap: 8px; }
  .sh-insight-bar-label { font-size: 11px; color: rgba(245,230,200,0.6); width: 90px; text-align: right; font-family: ui-monospace, monospace; }
  .sh-insight-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .sh-insight-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .sh-insight-bar-pct { font-size: 11px; color: rgba(245,230,200,0.45); width: 32px; font-family: ui-monospace, monospace; }
  .sh-insight-signal { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .sh-insight-signal:last-child { border-bottom: none; }
  .sh-insight-signal-icon { font-size: 16px; flex: 0 0 22px; text-align: center; padding-top: 2px; }
  .sh-insight-signal-title { font-size: 12px; font-weight: 700; color: #f2c77a; margin-bottom: 2px; }
  .sh-insight-signal-text { font-size: 12px; color: rgba(245,230,200,0.7); line-height: 1.5; }
  .sh-insight-action { display: flex; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text2); }
  .sh-insight-action-bullet { color: var(--gold); font-weight: 700; flex: 0 0 16px; }

  @media (max-width: 640px) {
    .share-wrap { padding: 16px 14px 60px; }
    .sh-theme-toggle { top: 10px; right: 10px; width: 32px; height: 32px; font-size: 14px; }
  }
</style>

<body>
<button class="sh-theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换黑白主题">☀️</button>
<div class="share-wrap" id="share-root">
  <div class="share-loading" id="loading">加载中...</div>
  <div class="share-error" id="error" style="display:none"></div>
  <div id="share-content" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/ticnote-renderer.js"></script>
<script>
const R = typeof TicNoteRenderer !== 'undefined' ? TicNoteRenderer : null;
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ══ Report parsing engine — ported from cockpit app.js ══

const BOLD_HEADLINE_RE = /^\*\*([^*\n]{2,40}?)\*\*\s*[：:、]?\s*([\s\S]*)$/;
const ACCENTS = ['indigo', 'amber', 'teal', 'rose', 'violet'];
const ROMAN = {I:1,II:2,III:3,IV:4,V:5,VI:6,VII:7,VIII:8,IX:9,X:10,XI:11,XII:12,XIII:13,XIV:14,XV:15};

function badgifyDoc(html) {
  if (!html) return html;
  return html.replace(/(?<![a-zA-Z])(Track\s*[1-3][A-B]?|Layer\s*[0-5]|L[0-5](?=[^a-z])|Zone\s*[1-5]|Curve\s*[1-7]|B[1-7]底盘|C[1-5]航道)(?![a-zA-Z])/gi, (m) => {
    let cls = 'track';
    if (/layer|^L\d/i.test(m)) cls = 'layer';
    else if (/zone/i.test(m)) cls = 'zone';
    else if (/curve/i.test(m)) cls = 'curve';
    else if (/底盘|^B\d/i.test(m)) cls = 'bottom';
    return `<span class="doc-badge doc-badge--${cls}">${m}</span>`;
  });
}

function md(txt) { return txt ? badgifyDoc(marked.parse(txt, {gfm:true, breaks:true})) : ''; }
function mdi(txt) { try { return marked.parseInline(txt || '', {gfm:true, breaks:false}); } catch(e) { return txt || ''; } }

function splitLongText(txt) {
  if (!txt || txt.length <= 220) return [txt || ''];
  const sentences = txt.match(/[^。！？!?]+[。！？!?]+|[^。！？!?]+$/g) || [txt];
  const groups = []; let cur = '';
  for (const s of sentences) {
    if ((cur + s).length > 240 && cur.length >= 120) { groups.push(cur); cur = s; }
    else { cur += s; }
  }
  if (cur) groups.push(cur);
  return groups;
}

function classifyBlock(b) {
  const t = b.trim();
  if (/^```/.test(t)) return 'code';
  if (/^#{3,6}\s/.test(t)) return 'heading';
  if (/^>/.test(t)) return 'quote';
  if (/^\|/.test(t)) return 'table';
  if (/^([-*+]|\d+\.)\s/m.test(t.split('\n')[0])) return 'list';
  if (/^(?:---+|\*\*\*+|___+)$/.test(t)) return 'hr';
  return 'para';
}

function buildSmartChunks(bodyText) {
  if (!bodyText || !bodyText.trim()) return [];
  const lines = bodyText.split('\n');
  const rawBlocks = []; let buf = []; let inFence = false;
  for (const ln of lines) {
    if (/^```/.test(ln.trim())) { buf.push(ln); if (inFence) { rawBlocks.push(buf.join('\n')); buf = []; inFence = false; } else { inFence = true; } continue; }
    if (inFence) { buf.push(ln); continue; }
    if (!ln.trim()) { if (buf.length) { rawBlocks.push(buf.join('\n')); buf = []; } } else { buf.push(ln); }
  }
  if (buf.length) rawBlocks.push(buf.join('\n'));

  const blocks = [];
  for (const rb of rawBlocks) {
    const t = classifyBlock(rb);
    const prev = blocks[blocks.length - 1];
    if (prev && t === 'list' && prev.type === 'list') prev.raw += '\n' + rb;
    else if (prev && t === 'table' && prev.type === 'table') prev.raw += '\n' + rb;
    else if (prev && t === 'quote' && prev.type === 'quote') prev.raw += '\n\n' + rb;
    else blocks.push({ type: t, raw: rb });
  }

  const chunks = []; let pendingProse = []; let accentCounter = 0;
  const flushProse = () => { if (!pendingProse.length) return; chunks.push({ kind: 'prose', md: pendingProse.join('\n\n') }); pendingProse = []; };
  for (const b of blocks) {
    if (b.type === 'heading') { flushProse(); const fl = b.raw.split('\n')[0]; const m = fl.match(/^(#{3,6})\s+(.*)$/); if (m) { chunks.push({ kind: 'h-sub', level: m[1].length, title: m[2].trim() }); const rest = b.raw.split('\n').slice(1).join('\n').trim(); if (rest) pendingProse.push(rest); } else { pendingProse.push(b.raw); } continue; }
    if (b.type === 'hr') { flushProse(); chunks.push({ kind: 'hr' }); continue; }
    if (b.type === 'code') { flushProse(); chunks.push({ kind: 'code-card', md: b.raw }); continue; }
    if (b.type === 'list') { flushProse(); chunks.push({ kind: 'list-card', md: b.raw }); continue; }
    if (b.type === 'table') { flushProse(); chunks.push({ kind: 'table-card', md: b.raw }); continue; }
    if (b.type === 'quote') { flushProse(); chunks.push({ kind: 'quote-card', md: b.raw }); continue; }
    const para = b.raw.replace(/\n/g, ' ').trim();
    const m = para.match(BOLD_HEADLINE_RE);
    if (m && para.length > 140) { flushProse(); chunks.push({ kind: 'headline-card', title: m[1].trim(), bodyParas: splitLongText(m[2].trim()), accent: ACCENTS[accentCounter++ % ACCENTS.length] }); }
    else if (para.length > 380) { flushProse(); chunks.push({ kind: 'long-prose', bodyParas: splitLongText(para) }); }
    else { pendingProse.push(b.raw); }
  }
  flushProse();
  return chunks;
}

function hydrateChunks(chunks) {
  return chunks.map(c => {
    if (c.kind === 'prose' || c.kind === 'list-card' || c.kind === 'table-card' || c.kind === 'quote-card' || c.kind === 'code-card') return { ...c, html: md(c.md) };
    if (c.kind === 'headline-card') return { ...c, bodyHtml: c.bodyParas.map(p => `<p>${mdi(p)}</p>`).join('') };
    if (c.kind === 'long-prose') return { ...c, html: c.bodyParas.map(p => `<p>${mdi(p)}</p>`).join('') };
    return c;
  });
}

function parseReport(raw) {
  let fmTitle = '', fmSubtitle = '', fmEyebrow = '', fmMeta = {};
  if (/^---\s*\n/.test(raw)) {
    const m = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
    if (m) {
      for (const ln of m[1].split('\n')) {
        const kv = ln.match(/^(\w+)\s*:\s*(.*)$/);
        if (!kv) continue;
        const k = kv[1], v = kv[2].replace(/^["']|["']$/g, '').trim();
        fmMeta[k] = v;
        if (k === 'title') fmTitle = v;
        else if (k === 'subtitle') fmSubtitle = v;
        else if (k === 'eyebrow') fmEyebrow = v;
      }
      raw = raw.slice(m[0].length);
    }
  }
  const lines = raw.split('\n');
  let title = fmTitle, eyebrow = fmEyebrow;
  const metaPills = [];
  const preface = [];
  let i = 0;
  while (i < lines.length && !lines[i].trim()) i++;
  if (!title && i < lines.length && /^#\s+/.test(lines[i])) { title = lines[i].replace(/^#\s+/, '').trim(); i++; }
  if (fmSubtitle) metaPills.push({ key: '副标题', val: fmSubtitle });
  while (i < lines.length && !lines[i].trim()) i++;
  const quoteLines = [];
  while (i < lines.length) {
    const l = lines[i];
    if (/^>\s?/.test(l)) { quoteLines.push(l.replace(/^>\s?/, '').trim()); i++; }
    else if (!l.trim() && quoteLines.length && i+1 < lines.length && /^>\s?/.test(lines[i+1])) { i++; }
    else break;
  }
  while (i < lines.length && !lines[i].trim()) i++;
  if (quoteLines.length) {
    const pillRe = /\*\*([^*]+)\*\*[：:]\s*([^·\n]+)/g;
    for (const q of quoteLines) { let m; while ((m = pillRe.exec(q)) !== null) metaPills.push({ key: m[1].trim(), val: m[2].trim().replace(/\s*[（(].*$/,'') }); }
    if (metaPills.length) eyebrow = quoteLines.length > 1 ? quoteLines[1].replace(/\*\*/g, '').trim() : '';
    else eyebrow = quoteLines[0].replace(/\*\*/g, '').trim();
  }
  while (i < lines.length && !/^##\s+/.test(lines[i])) { preface.push(lines[i]); i++; }
  const sections = []; let cur = null;
  while (i < lines.length) {
    const l = lines[i];
    if (/^##\s+/.test(l)) {
      if (cur) sections.push(cur);
      const rawTitle = l.replace(/^##\s+/, '').trim();
      const m = rawTitle.match(/^(\d{1,2})[\s·.、）)]+(.*)$/) || rawTitle.match(/^((?:X{0,2}(?:IX|IV|V?I{1,3}|V)))[\s·.、）)]+(.*)$/);
      let numStr = '';
      if (m && m[1]) { const r = m[1]; numStr = ROMAN[r] !== undefined ? String(ROMAN[r]).padStart(2, '0') : r.padStart(2, '0'); }
      cur = { id: 'rv-sec-' + sections.length, num: numStr, hasExplicitNum: !!m, title: m ? m[2].trim() : rawTitle, body: [] };
    } else if (cur) { cur.body.push(l); } else { preface.push(l); }
    i++;
  }
  if (cur) sections.push(cur);
  return {
    title, eyebrow, metaPills, fmMeta,
    prefaceHtml: md(preface.join('\n').trim()),
    sections: sections.map(s => {
      const bodyText = s.body.join('\n').trim();
      const chunks = hydrateChunks(buildSmartChunks(bodyText));
      return { ...s, html: md(bodyText), chunks };
    }),
  };
}

// ══ Render functions ══

function renderChunks(chunks) {
  return chunks.map((c, ci) => {
    if (c.kind === 'headline-card') return `<div class="rv-chunk rv-chunk-headline" data-accent="${c.accent}"><div class="rv-chunk-headline-bar"></div><div class="rv-chunk-headline-body"><h3 class="rv-chunk-headline-title">${esc(c.title)}</h3><div class="rv-chunk-headline-text">${badgifyDoc(c.bodyHtml)}</div></div></div>`;
    if (c.kind === 'long-prose') return `<div class="rv-chunk rv-chunk-prose">${badgifyDoc(c.html)}</div>`;
    if (c.kind === 'h-sub' && c.level === 3) return `<h3 class="rv-chunk rv-chunk-h3">${esc(c.title)}</h3>`;
    if (c.kind === 'h-sub' && c.level === 4) return `<h4 class="rv-chunk rv-chunk-h4">${esc(c.title)}</h4>`;
    if (c.kind === 'h-sub') return `<h5 class="rv-chunk rv-chunk-h5">${esc(c.title)}</h5>`;
    if (c.kind === 'list-card') return `<div class="rv-chunk rv-chunk-list">${badgifyDoc(c.html)}</div>`;
    if (c.kind === 'table-card') return `<div class="rv-chunk rv-chunk-table">${badgifyDoc(c.html)}</div>`;
    if (c.kind === 'quote-card') return `<div class="rv-chunk rv-chunk-quote">${badgifyDoc(c.html)}</div>`;
    if (c.kind === 'code-card') return `<div class="rv-chunk rv-chunk-code">${c.html}</div>`;
    if (c.kind === 'prose') return `<div class="rv-chunk rv-chunk-prose">${badgifyDoc(c.html)}</div>`;
    if (c.kind === 'hr') return `<hr class="rv-chunk-hr"/>`;
    return '';
  }).join('');
}

function renderReportPage(parsed) {
  let html = '';
  // Hero
  html += `<section class="rv-hero">`;
  if (parsed.eyebrow) html += `<div class="rv-hero-eyebrow">${esc(parsed.eyebrow)}</div>`;
  html += `<h1 class="rv-hero-title">${esc(parsed.title)}</h1>`;
  if (parsed.metaPills.length) {
    html += `<div class="rv-hero-pills">`;
    for (const p of parsed.metaPills) html += `<div class="rv-pill"><span class="rv-pill-k">${esc(p.key)}</span><span class="rv-pill-v">${esc(p.val)}</span></div>`;
    html += `</div>`;
  }
  html += `<div class="rv-hero-line"></div></section>`;
  // Body grid
  html += `<div class="rv-body">`;
  // TOC
  if (parsed.sections.length > 1) {
    html += `<aside class="rv-toc" id="rv-toc">`;
    html += `<button class="rv-toc-toggle" onclick="cycleTocMode()" id="toc-toggle-btn"><span>✕</span></button>`;
    html += `<div class="rv-toc-label" id="toc-label">目&nbsp;录</div>`;
    html += `<ul class="rv-toc-list">`;
    for (const s of parsed.sections) {
      const abbr = s.title.slice(0, 2);
      html += `<li onclick="document.getElementById('${s.id}').scrollIntoView({behavior:'smooth',block:'start'})">`;
      html += `<span class="rv-toc-num">${s.num || '·'}</span>`;
      html += `<span class="rv-toc-txt rv-toc-txt--full">${esc(s.title)}</span>`;
      html += `<span class="rv-toc-txt rv-toc-txt--abbr" style="display:none">${esc(abbr)}</span>`;
      html += `</li>`;
    }
    html += `</ul></aside>`;
  }
  // Main
  html += `<div class="rv-main">`;
  if (parsed.prefaceHtml) html += `<div class="rv-preface">${parsed.prefaceHtml}</div>`;
  for (const s of parsed.sections) {
    html += `<section id="${s.id}" class="rv-section">`;
    html += `<div class="rv-sec-head">`;
    if (s.hasExplicitNum) html += `<div class="rv-sec-num">${s.num}</div>`;
    else html += `<div class="rv-sec-num rv-sec-num-dot">&#9670;</div>`;
    html += `<div class="rv-sec-title-wrap"><div class="rv-sec-title">${esc(s.title)}</div><div class="rv-sec-rule"></div></div></div>`;
    if (s.chunks && s.chunks.length) html += `<div class="rv-sec-body rv-sec-chunked">${renderChunks(s.chunks)}</div>`;
    else html += `<div class="rv-sec-body">${s.html}</div>`;
    html += `</section>`;
  }
  html += `</div></div>`;
  html += `<div class="sh-footer">Ome365 · 千丁数智驾舱</div>`;
  return html;
}

// ══ TicNote rendering (unchanged) ══

function switchTab(name) {
  document.querySelectorAll('.sh-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  ['summary','transcript','insights'].forEach(n => { document.getElementById('tab-' + n).style.display = n === name ? '' : 'none'; });
}

function renderTicNotePage(title, result) {
  const m = result.meta;
  let html = `<section class="rv-hero"><div class="rv-hero-eyebrow">访谈纪要</div><h1 class="rv-hero-title">${esc(title)}</h1><div class="rv-hero-pills">`;
  if (m.date) html += `<div class="rv-pill"><span class="rv-pill-k">日期</span><span class="rv-pill-v">${esc(m.date)}</span></div>`;
  if (m.duration) html += `<div class="rv-pill"><span class="rv-pill-k">时长</span><span class="rv-pill-v">${esc(m.duration)}</span></div>`;
  if (m.participants) html += `<div class="rv-pill"><span class="rv-pill-k">参与者</span><span class="rv-pill-v">${esc(m.participants)}</span></div>`;
  html += `</div><div class="rv-hero-line"></div></section>`;
  // Tabs
  html += `<div class="sh-tabs"><button class="sh-tab active" data-tab="summary" onclick="switchTab('summary')">📋 总结</button><button class="sh-tab" data-tab="transcript" onclick="switchTab('transcript')">🎤 转录 <span class="sh-tab-count">${result.transBlocks.length}</span></button><button class="sh-tab" data-tab="insights" onclick="switchTab('insights')">💡 洞察</button></div>`;
  html += `<div id="tab-summary" class="sh-tab-content">${renderSummary(result.sumSections)}</div>`;
  html += `<div id="tab-transcript" class="sh-tab-content" style="display:none">${renderTranscript(result.transBlocks, result.insights)}</div>`;
  html += `<div id="tab-insights" class="sh-tab-content" style="display:none">${renderInsights(result.insights)}</div>`;
  html += `<div class="sh-footer">Ome365 · 千丁数智驾舱</div>`;
  return html;
}

function renderSummary(sections) {
  return sections.map((s, i) => `<div class="sh-sum-card"><div class="sh-sum-card-head"><span class="sh-sum-card-num">${String(i+1).padStart(2,'0')}</span><span class="sh-sum-card-icon">${esc(s.icon)}</span><span class="sh-sum-card-title">${esc(s.title)}</span></div><div class="sh-sum-card-body">${R ? R.renderMd(s.body) : md(s.body)}</div></div>`).join('');
}

function renderTranscript(blocks, insights) {
  const COLORS = R ? R.SPEAKER_COLORS : ['#60a5fa','#34d399','#fbbf24','#f472b6','#a78bfa','#38bdf8','#fb923c','#e879f9'];
  let html = '';
  if (insights.speakerStats && insights.speakerStats.length) {
    html += '<div class="sh-trans-legend">';
    for (const s of insights.speakerStats) html += `<span class="sh-trans-chip" style="border-color:${s.color}"><span class="sh-trans-chip-dot" style="background:${s.color}"></span>${esc(s.speaker)} <span class="sh-trans-chip-pct">${s.pct}%</span></span>`;
    html += '</div>';
  }
  html += '<div class="sh-trans-blocks">';
  for (const b of blocks) {
    const idx = parseInt((b.speakerRaw || b.speaker).replace(/\D/g, '')) || 0;
    const color = COLORS[idx % COLORS.length];
    html += `<div class="sh-trans-block"><div class="sh-trans-gutter"><div class="sh-trans-avatar" style="background:${color}">${esc(b.speaker.substring(0,1))}</div><div class="sh-trans-line"></div></div><div class="sh-trans-content"><div class="sh-trans-meta"><span class="sh-trans-name" style="color:${color}">${esc(b.speaker)}</span><span class="sh-trans-time">${esc(b.time)}</span></div><div class="sh-trans-text">${esc(b.text)}</div></div></div>`;
  }
  html += '</div>';
  return html;
}

function renderInsights(insights) {
  let html = `<div class="sh-insight-card sh-insight-overview"><div class="sh-insight-card-icon">📊</div><div class="sh-insight-card-body"><div class="sh-insight-card-title">会议概览</div><div class="sh-insight-card-text">${esc(insights.overview)}</div></div></div>`;
  if (insights.speakerStats && insights.speakerStats.length) {
    html += `<div class="sh-insight-card"><div class="sh-insight-card-icon">🎙️</div><div class="sh-insight-card-body"><div class="sh-insight-card-title">发言占比</div><div class="sh-insight-bars">`;
    for (const s of insights.speakerStats) html += `<div class="sh-insight-bar-row"><span class="sh-insight-bar-label">${esc(s.speaker)}</span><div class="sh-insight-bar-track"><div class="sh-insight-bar-fill" style="width:${s.pct}%;background:${s.color}"></div></div><span class="sh-insight-bar-pct">${s.pct}%</span></div>`;
    html += '</div></div></div>';
  }
  if (insights.keySignals && insights.keySignals.length) {
    html += `<div class="sh-insight-card"><div class="sh-insight-card-icon">🔑</div><div class="sh-insight-card-body"><div class="sh-insight-card-title">关键信号</div>`;
    for (const sig of insights.keySignals) html += `<div class="sh-insight-signal"><span class="sh-insight-signal-icon">${esc(sig.icon)}</span><div><div class="sh-insight-signal-title">${esc(sig.title)}</div><div class="sh-insight-signal-text">${esc(sig.text)}</div></div></div>`;
    html += '</div></div>';
  }
  for (const c of (insights.consensus || [])) html += `<div class="sh-insight-card"><div class="sh-insight-card-icon">🤝</div><div class="sh-insight-card-body"><div class="sh-insight-card-title">达成共识</div><div class="sh-insight-card-text">${md(c.text)}</div></div></div>`;
  for (const r of (insights.risks || [])) html += `<div class="sh-insight-card sh-insight-risk"><div class="sh-insight-card-icon">⚠️</div><div class="sh-insight-card-body"><div class="sh-insight-card-title">未解决 / 风险</div><div class="sh-insight-card-text">${md(r.text)}</div></div></div>`;
  if (insights.actionItems && insights.actionItems.length) {
    html += `<div class="sh-insight-card"><div class="sh-insight-card-icon">📌</div><div class="sh-insight-card-body"><div class="sh-insight-card-title">行动项</div>`;
    for (const a of insights.actionItems) html += `<div class="sh-insight-action"><span class="sh-insight-action-bullet">→</span><span>${esc(a)}</span></div>`;
    html += '</div></div>';
  }
  return html;
}

// ══ Init ══

async function init() {
  const parts = location.pathname.split('/').filter(Boolean);
  if (parts.length < 2) { showError('无效的分享链接'); return; }
  const [user, slug] = parts;
  try {
    let res = await fetch(`/api/doc/${user}/${slug}`);
    let data, raw, title, meta;
    if (res.ok) {
      data = await res.json();
      raw = data.raw; title = data.title || data.meta?.title || slug; meta = data.meta || {};
    } else {
      res = await fetch('/api/share/' + slug);
      if (!res.ok) { showError(res.status === 404 ? '文档不存在或链接已失效' : '加载失败'); return; }
      data = await res.json();
      raw = data.raw; title = data.title || data.name || slug; meta = {};
    }
    const isTicNote = /^## 转录/m.test(raw) && /^SPEAKER_\d+$/m.test(raw);
    const content = document.getElementById('share-content');
    if (isTicNote && R) {
      const result = R.processDocument(raw, data.name || '');
      content.innerHTML = renderTicNotePage(title, result);
    } else {
      const parsed = parseReport(raw);
      if (!parsed.title) parsed.title = title;
      if (!parsed.eyebrow && meta.eyebrow) parsed.eyebrow = meta.eyebrow;
      if (!parsed.eyebrow && meta.category) parsed.eyebrow = meta.category;
      if (!parsed.eyebrow) parsed.eyebrow = '战略文档';
      // Add frontmatter pills not already captured
      if (meta.date && !parsed.metaPills.find(p => p.key === '日期')) parsed.metaPills.push({ key: '日期', val: meta.date });
      if (meta.version && !parsed.metaPills.find(p => p.key === '版本')) parsed.metaPills.push({ key: '版本', val: meta.version });
      if (meta.author && !parsed.metaPills.find(p => p.key === '作者')) parsed.metaPills.push({ key: '作者', val: meta.author });
      content.innerHTML = renderReportPage(parsed);
    }
    document.title = (title) + ' · Ome365';
    document.getElementById('loading').style.display = 'none';
    content.style.display = '';
    requestAnimationFrame(() => applyEntranceAnimations());
  } catch (e) {
    showError('网络错误: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error');
  el.textContent = msg; el.style.display = '';
}

let _tocMode = 'full'; // 'full' | 'slim' | 'hidden'
function cycleTocMode() {
  const order = ['full', 'slim', 'hidden'];
  _tocMode = order[(order.indexOf(_tocMode) + 1) % order.length];
  const toc = document.getElementById('rv-toc');
  if (!toc) return;
  toc.classList.remove('rv-toc--slim', 'rv-toc--hidden');
  if (_tocMode !== 'full') toc.classList.add('rv-toc--' + _tocMode);
  const btn = document.getElementById('toc-toggle-btn');
  if (btn) btn.innerHTML = _tocMode === 'hidden' ? '<span>☰</span>' : _tocMode === 'slim' ? '<span>◀</span>' : '<span>✕</span>';
  btn.title = _tocMode === 'full' ? '收起目录' : _tocMode === 'slim' ? '隐藏目录' : '展开目录';
  const label = document.getElementById('toc-label');
  if (label) label.style.display = _tocMode === 'full' ? '' : 'none';
  toc.querySelectorAll('.rv-toc-txt--full').forEach(el => { el.style.display = _tocMode === 'full' ? '' : 'none'; });
  toc.querySelectorAll('.rv-toc-txt--abbr').forEach(el => { el.style.display = _tocMode === 'slim' ? '' : 'none'; });
}

function applyEntranceAnimations() {
  const hero = document.querySelector('.rv-hero');
  if (hero) { hero.style.animation = 'slideUp 0.5s ease both'; }
  document.querySelectorAll('.rv-hero-pills .rv-pill').forEach((el, i) => {
    el.style.animation = `slideUp 0.35s ease ${0.3 + i * 0.06}s both`;
  });
  document.querySelectorAll('.rv-section').forEach((el, i) => {
    el.style.animation = `slideUp 0.45s ease ${0.15 + i * 0.08}s both`;
  });
  const toc = document.querySelector('.rv-toc');
  if (toc) toc.style.animation = 'slideUp 0.4s ease 0.2s both';
}

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'longfor';
  const next = isLight ? '' : 'longfor';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
  // Use same storage key as share_home.html so theme persists across share pages
  localStorage.setItem('sh-theme', next);
}
(function(){
  // Migrate legacy 'share-theme' (values 'light'/'dark') to 'sh-theme' (values 'longfor'/'')
  const legacy = localStorage.getItem('share-theme');
  if (legacy !== null && localStorage.getItem('sh-theme') === null) {
    localStorage.setItem('sh-theme', legacy === 'light' ? 'longfor' : '');
    localStorage.removeItem('share-theme');
  }
  const saved = localStorage.getItem('sh-theme');
  if (saved === 'longfor') {
    document.documentElement.setAttribute('data-theme', 'longfor');
    const t = document.getElementById('theme-toggle'); if (t) t.textContent = '🌙';
  }
})();

init();
</script>
