<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ome365 · 共享知识库</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080d; --text:#e8e8f0; --text2:#7c7c96; --text3:#484860;
  --gold:#d4b07a; --gold-dim:rgba(212,176,122,0.1); --gold-soft:rgba(212,176,122,0.06);
  --border:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.1);
  --card-bg:rgba(18,18,30,0.8); --surface:rgba(18,18,30,0.8);
  --accent:#d4b07a; --accent-2:#e5c88c;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.35), 0 4px 8px rgba(0,0,0,0.2);
}
[data-theme="light"]{
  --bg:#f5f8fd; --text:#1a2b45; --text2:#5b6b82; --text3:#9aa6b8;
  --gold:#0055a6; --gold-dim:rgba(0,85,166,0.08); --gold-soft:rgba(0,85,166,0.04);
  --border:rgba(0,85,166,0.1); --border-strong:rgba(0,85,166,0.18);
  --card-bg:rgba(255,255,255,0.96); --surface:rgba(255,255,255,0.96);
  --accent:#0055a6; --accent-2:#1a6fc0;
  --shadow-sm:0 1px 2px rgba(17,34,64,0.04), 0 1px 3px rgba(17,34,64,0.03);
  --shadow-lg:0 8px 32px rgba(17,34,64,0.1), 0 4px 12px rgba(17,34,64,0.05);
}
html,body{background:var(--bg);color:var(--text);min-height:100vh}
body{font:15px/1.5 'Inter','Noto Sans SC',-apple-system,'PingFang SC',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--gold-dim);color:var(--text)}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* ── Ambient glow ── */
body::before{content:'';position:fixed;inset:-20% 0 0 0;background:radial-gradient(ellipse 1100px 620px at 50% 0%, rgba(212,176,122,0.07), transparent 60%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse 1100px 620px at 50% 0%, rgba(0,85,166,0.08), transparent 60%)}
body::after{content:'';position:fixed;bottom:-30%;right:-20%;width:700px;height:700px;background:radial-gradient(circle, var(--gold-soft), transparent 65%);pointer-events:none;z-index:0;filter:blur(4px)}

.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:22px 28px 120px;min-height:100vh;display:flex;flex-direction:column}

/* ── Top bar ── */
.top{display:flex;align-items:center;gap:10px;padding-bottom:28px;margin-bottom:42px;border-bottom:1px solid var(--border)}
.logo-r{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:2.5px solid var(--gold);border-radius:50%;font-size:0;background:radial-gradient(circle at 30% 30%, rgba(212,176,122,0.15), transparent 70%);box-shadow:0 0 12px rgba(212,176,122,0.2);transition:all .3s ease;flex-shrink:0}
[data-theme="light"] .logo-r{background:radial-gradient(circle at 30% 30%, rgba(0,85,166,0.12), transparent 70%);box-shadow:0 0 12px rgba(0,85,166,0.18)}
.logo-r:hover{box-shadow:0 0 20px rgba(212,176,122,0.35);border-color:#e8c892}
[data-theme="light"] .logo-r:hover{box-shadow:0 0 22px rgba(0,85,166,0.32);border-color:#1a6fc0}
.logo-365{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:15px;font-weight:600;color:var(--text3);margin-left:2px}
.brand-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);margin:0 4px}
.brand-tag{font:500 12.5px/1 -apple-system;color:var(--text2);letter-spacing:0.02em}
.brand-suffix{margin-left:6px;font:500 12px/1 -apple-system;color:var(--text3);letter-spacing:.02em}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb{height:32px;min-width:32px;padding:0 10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.tb:hover{border-color:var(--border-strong);color:var(--text)}
.tb svg{display:block}

/* Avatar (top-right, site-level) */
.me{display:inline-flex;align-items:center;gap:9px;padding:4px 12px 4px 4px;height:38px;border-radius:22px;border:1px solid var(--border);background:var(--card-bg);transition:all .18s;cursor:default;user-select:none;-webkit-user-select:none}
.me:hover{border-color:var(--border-strong)}
.me-dot{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,var(--gold) 100%);display:grid;place-items:center;color:#08080d;font:700 13px/1 -apple-system;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2)}
[data-theme="light"] .me-dot{color:#fff}
.me-label{font-size:12.5px;font-weight:500;color:var(--text2);letter-spacing:0.01em}

/* ── Hero ── */
.hero{text-align:center;padding:30px 0 52px}
.hero-eyebrow{font:500 11px/1 -apple-system;color:var(--accent);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:22px;display:inline-flex;align-items:center;gap:10px}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:22px;height:1px;background:var(--accent);opacity:.6}
.hero-title{font-size:clamp(34px,5vw,46px);font-weight:700;letter-spacing:-0.024em;line-height:1.12;background:linear-gradient(180deg,var(--text) 0%,var(--text2) 180%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.hero-sub{margin-top:14px;font-size:15px;color:var(--text2);letter-spacing:0.02em;line-height:1.6;max-width:540px;margin-left:auto;margin-right:auto}
.hero-sub b{color:var(--accent);font-weight:500}

/* ── Users grid ── */
.section-label{display:flex;align-items:center;gap:12px;margin:0 auto 22px;max-width:920px;padding:0 6px;font:500 11px/1 -apple-system;color:var(--text3);letter-spacing:0.18em;text-transform:uppercase}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.users{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:920px;margin:0 auto}
.user-card{position:relative;display:block;padding:36px 28px 32px;border-radius:20px;border:1px solid var(--border);background:var(--card-bg);transition:transform .24s cubic-bezier(.2,.8,.2,1),border-color .2s,box-shadow .2s,background .2s;overflow:hidden;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.user-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at 120% -20%, var(--gold-dim), transparent 55%);opacity:0;transition:opacity .22s;pointer-events:none}
.user-card::after{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,transparent 0%,var(--accent) 50%,transparent 100%);opacity:0;transition:opacity .25s}
.user-card:hover{transform:translateY(-4px);border-color:var(--border-strong);box-shadow:var(--shadow-sm),0 14px 40px rgba(0,0,0,0.25)}
[data-theme="light"] .user-card:hover{box-shadow:var(--shadow-sm),0 14px 40px rgba(15,23,42,0.09)}
.user-card:hover::before{opacity:1}
.user-card:hover::after{opacity:.7}

.uc-top{display:flex;align-items:center;gap:16px;margin-bottom:22px}
.uc-avatar{width:64px;height:64px;border-radius:32px;background:linear-gradient(135deg,var(--accent) 0%,var(--gold) 100%);display:grid;place-items:center;font:700 24px/1 -apple-system;color:#08080d;flex-shrink:0;box-shadow:0 8px 22px rgba(212,176,122,0.28), inset 0 1px 0 rgba(255,255,255,0.22)}
[data-theme="light"] .uc-avatar{color:#fff;box-shadow:0 8px 22px rgba(0,85,166,0.26), inset 0 1px 0 rgba(255,255,255,0.3)}
.uc-info{flex:1;min-width:0}
.uc-name{font-size:20px;font-weight:700;letter-spacing:-0.012em;color:var(--text);line-height:1.2}
.uc-handle{margin-top:4px;font:500 11.5px/1 ui-monospace,Menlo,monospace;color:var(--text3);letter-spacing:0}

.uc-stats{display:flex;align-items:baseline;gap:20px;padding-top:18px;border-top:1px solid var(--border)}
.uc-stat{flex:1;min-width:0}
.uc-stat-num{font:700 24px/1 ui-monospace,Menlo,monospace;color:var(--accent);letter-spacing:-0.01em;font-variant-numeric:tabular-nums;display:inline-block}
.uc-stat-unit{font-size:12px;color:var(--text3);margin-left:4px}
.uc-stat-label{display:block;margin-top:4px;font-size:11.5px;color:var(--text3);letter-spacing:0.02em}

.uc-arrow{position:absolute;right:22px;bottom:22px;width:34px;height:34px;border-radius:17px;background:var(--gold-soft);display:grid;place-items:center;color:var(--accent);transition:transform .24s cubic-bezier(.2,.8,.2,1),background .18s;opacity:.85}
.user-card:hover .uc-arrow{transform:translateX(4px);background:var(--gold-dim);opacity:1}
.uc-arrow svg{display:block}

/* Empty state */
.empty{max-width:480px;margin:40px auto;padding:36px 28px;border-radius:16px;border:1.5px dashed var(--border-strong);background:var(--card-bg);text-align:center;color:var(--text2);font-size:13.5px;line-height:1.7}
.empty-title{color:var(--text);font-size:15px;font-weight:600;margin-bottom:6px}
.empty code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--gold-soft);padding:2px 6px;border-radius:4px;color:var(--accent);font-size:12.5px}

/* ── Footer ── */
.ft{margin-top:auto;padding-top:40px;padding-bottom:8px;text-align:center;font-size:11.5px;color:var(--text3);border-top:1px solid var(--border)}
.ft-row{display:inline-flex;align-items:center;gap:8px;opacity:.8}
.ft-row .logo-r{width:18px;height:18px;border-width:1.8px;box-shadow:none}
.ft-row .logo-365{font-size:12px}
.ft-note{margin-top:6px;font-size:11px;color:var(--text3);letter-spacing:.02em}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hero,.section-label,.users,.empty{animation:fadeUp .4s cubic-bezier(.2,.8,.2,1) both}
.hero{animation-delay:.02s}
.section-label{animation-delay:.08s}
.users,.empty{animation-delay:.14s}

@media(max-width:640px){
  .wrap{padding:18px 18px 80px}
  .hero{padding:18px 0 36px}
  .users{grid-template-columns:1fr;gap:14px}
  .user-card{padding:28px 22px 26px}
  .uc-avatar{width:54px;height:54px;font-size:20px}
  .uc-name{font-size:18px}
  .uc-stat-num{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="logo-r" href="/" title="Ome365">O</a>
    <span class="logo-365">365</span>
    <span class="brand-dot"></span>
    <span class="brand-tag">共享知识库</span>
    <span class="brand-suffix" id="brandSuffix" style="display:none"></span>
    <div class="top-right">
      <button class="tb" id="btnTheme" title="切换色系" onclick="toggleTheme()" aria-label="切换色系">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5A5.5 5.5 0 017 12.5z" fill="currentColor"/></svg>
      </button>
      <div class="me" title="以访客身份浏览">
        <span class="me-dot" id="meDot">O</span>
        <span class="me-label">访客</span>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">KNOWLEDGE THAT LIVES WITH YOU</div>
    <h1 class="hero-title">Ome365 共享知识库</h1>
    <p class="hero-sub">选择一位作者，进入 ta 的<b>精选知识池</b>——长期沉淀、可流转、只读访问。</p>
  </div>

  <div id="content"></div>

  <div class="ft">
    <div class="ft-row"><span class="logo-r">O</span><span class="logo-365">365</span></div>
    <div class="ft-note" id="footerText">共享知识库 · 本地部署 · 云端分享</div>
  </div>
</div>

<script>
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

let theme = localStorage.getItem('sh-theme') || '';
if (theme) document.documentElement.setAttribute('data-theme', theme);

function toggleTheme(){
  const on = document.documentElement.getAttribute('data-theme') === 'light';
  if (on) document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme','light');
  theme = on ? '' : 'light';
  localStorage.setItem('sh-theme', theme);
}

async function applyTenantBrand(){
  try{
    const r = await fetch('/api/tenant/config');
    if(!r.ok) return;
    const cfg = await r.json();
    const brand = cfg.brand || {};
    if (!localStorage.getItem('sh-theme') && brand.theme_variant_id === 'light'){
      document.documentElement.setAttribute('data-theme','light');
      theme = 'light';
    }
    if (brand.short_name || brand.name){
      const suf = $('brandSuffix');
      if (suf){ suf.textContent = brand.short_name || brand.name; suf.style.display = 'inline'; }
      document.title = 'Ome365 · ' + (brand.short_name || brand.name) + ' 共享知识库';
    }
    if (brand.share_footer_text){
      const ft = $('footerText');
      if (ft) ft.textContent = brand.share_footer_text;
    }
  } catch(_){}
}

function arrowSvg(){
  return '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">'
    + '<path d="M3.5 8h9M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function userCard(u){
  const initial = (u.user || '?')[0].toUpperCase();
  const docs = Number(u.doc_count || 0);
  const folders = Number(u.folder_count || 0);
  return '<a class="user-card" href="/' + esc(u.user) + '" aria-label="打开 ' + esc(u.user) + ' 的共享知识库">'
    + '<div class="uc-top">'
    +   '<div class="uc-avatar">' + esc(initial) + '</div>'
    +   '<div class="uc-info">'
    +     '<div class="uc-name">' + esc(u.user) + '</div>'
    +     '<div class="uc-handle">/' + esc(u.user) + '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="uc-stats">'
    +   '<div class="uc-stat"><span class="uc-stat-num">' + docs + '</span><span class="uc-stat-unit">份</span><span class="uc-stat-label">共享文档</span></div>'
    +   (folders > 0 ? '<div class="uc-stat"><span class="uc-stat-num">' + folders + '</span><span class="uc-stat-unit">个</span><span class="uc-stat-label">分类</span></div>' : '')
    + '</div>'
    + '<div class="uc-arrow">' + arrowSvg() + '</div>'
    + '</a>';
}

function emptyState(){
  return '<div class="empty"><div class="empty-title">暂无共享作者</div>'
    + '还没有任何作者在本站发布共享文档。<br>'
    + '运营者可在主站通过 <code>🔗 分享</code> 按钮发布第一份文档。</div>';
}

function sectionLabel(n){
  return '<div class="section-label">' + (n > 0 ? ('共 ' + n + ' 位作者') : '作者入口') + '</div>';
}

(async () => {
  applyTenantBrand();
  try{
    const r = await fetch('/api/users');
    if (!r.ok) throw new Error('fetch users failed: ' + r.status);
    const data = await r.json();
    const users = Array.isArray(data.users) ? data.users : [];
    users.sort((a,b) => (b.doc_count||0) - (a.doc_count||0) || String(a.user).localeCompare(String(b.user)));
    const host = $('content');
    if (!users.length){ host.innerHTML = emptyState(); return; }
    host.innerHTML = sectionLabel(users.length) + '<div class="users">' + users.map(userCard).join('') + '</div>';
  } catch(err){
    $('content').innerHTML = '<div class="empty"><div class="empty-title">加载失败</div>请刷新页面重试。<br><span style="color:var(--text3);font-size:12px">' + esc(String(err)) + '</span></div>';
  }
})();
</script>
</body>
</html>
